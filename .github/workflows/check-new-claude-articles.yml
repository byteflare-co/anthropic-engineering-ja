name: Check for new Claude blog articles

on:
  schedule:
    # 毎日 00:47 UTC (= JST 09:47) に実行。Anthropic 側 (00:17) と 30 分ずらす。
    - cron: "47 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Check for new Claude blog articles
        id: check
        run: |
          uv run python scripts/check_new_claude_articles.py | tee /tmp/check_result.json

      - name: Open issues for new articles
        if: steps.check.outputs.new_count != '0' && steps.check.outputs.new_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/check_result.json', 'utf8'));

            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'new-claude-article',
                per_page: 100,
              }
            );
            const existingTitles = new Set(existing.map(i => i.title));

            for (const article of data.new_articles) {
              const title = `📰 Claude 新着記事: ${article.title}`;
              if (existingTitles.has(title)) {
                console.log(`Already tracked, skip: ${title}`);
                continue;
              }
              const body = [
                `Claude ブログに新しい記事を検出しました。`,
                ``,
                `- **タイトル**: ${article.title}`,
                `- **slug**: \`${article.slug}\``,
                `- **URL**: ${article.url}`,
                ``,
                `## 自動処理`,
                ``,
                `この issue は \`publish-new-claude-article.yml\` workflow によって`,
                `自動処理されます。Claude Code が fetch・翻訳・commit まで`,
                `一連の作業を実行し、完了後にこの issue をクローズします。`,
                ``,
                `進捗は [Actions タブ](../../actions/workflows/publish-new-claude-article.yml)`,
                `で確認できます。失敗した場合はこの issue にコメントが付きます。`,
                ``,
                `---`,
                `*Auto-generated by \`.github/workflows/check-new-claude-articles.yml\`*`,
              ].join('\n');

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['new-claude-article'],
              });
              console.log(`Created issue #${created.data.number}: ${title}`);

              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'publish-new-claude-article.yml',
                ref: 'main',
                inputs: {
                  issue_number: String(created.data.number),
                },
              });
              console.log(`Dispatched publish-new-claude-article.yml for issue #${created.data.number}`);
            }

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/check_result.json ]; then
            count=$(jq -r '.count' /tmp/check_result.json)
            found=$(jq -r '.found_total' /tmp/check_result.json)
            existing=$(jq -r '.existing_count' /tmp/check_result.json)
            {
              echo "## 結果 (Claude Blog)"
              echo ""
              echo "- 既登録: $existing 本"
              echo "- 一覧で発見: $found 本"
              echo "- **新着: $count 本**"
              if [ "$count" != "0" ]; then
                echo ""
                echo "### 新着記事"
                jq -r '.new_articles[] | "- [\(.title)](\(.url)) [`\(.slug)`]"' /tmp/check_result.json
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
