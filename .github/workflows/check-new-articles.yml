name: Check for new engineering articles

on:
  schedule:
    # 毎日 00:17 UTC (= JST 09:17) に実行。
    # 「ちょうど」の時刻は GitHub Actions の負荷で遅延しがちなので 17 分にずらす。
    - cron: "17 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Check for new articles
        id: check
        run: |
          uv run python scripts/check_new_articles.py | tee /tmp/check_result.json

      - name: Open issues for new articles
        if: steps.check.outputs.new_count != '0' && steps.check.outputs.new_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/check_result.json', 'utf8'));

            // 既存の open イシューをラベルで取得して重複作成を防ぐ
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'new-article',
                per_page: 100,
              }
            );
            const existingTitles = new Set(existing.map(i => i.title));

            for (const article of data.new_articles) {
              const title = `📰 新着記事: ${article.title}`;
              if (existingTitles.has(title)) {
                console.log(`Already tracked, skip: ${title}`);
                continue;
              }
              const body = [
                `Anthropic Engineering ブログに新しい記事を検出しました。`,
                ``,
                `- **タイトル**: ${article.title}`,
                `- **slug**: \`${article.slug}\``,
                `- **URL**: ${article.url}`,
                ``,
                `## 追加手順`,
                ``,
                `Claude Code でこのプロジェクトを開いて、\`publish-engineering-article-ja\` skill が`,
                `自動で起動するよう次のように指示すると一連の作業が進みます:`,
                ``,
                `> ${article.url} を日本語 PDF として追加してください。`,
                ``,
                `または手動で:`,
                ``,
                `1. \`scripts/articles.py\` の \`ARTICLES\` に新しい \`ArticleMeta(...)\` を追加`,
                `2. \`uv run python scripts/fetch_article.py --slug ${article.slug}\``,
                `3. \`articles/ja/NN_${article.slug}.md\` に翻訳を書く`,
                `4. \`uv run python scripts/build_pdf.py --slug ${article.slug}\``,
                `5. \`index.json\` を更新してこのイシューをクローズ`,
                ``,
                `---`,
                `*Auto-generated by \`.github/workflows/check-new-articles.yml\`*`,
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['new-article'],
              });
              console.log(`Created issue: ${title}`);
            }

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/check_result.json ]; then
            count=$(jq -r '.count' /tmp/check_result.json)
            found=$(jq -r '.found_total' /tmp/check_result.json)
            existing=$(jq -r '.existing_count' /tmp/check_result.json)
            {
              echo "## 結果"
              echo ""
              echo "- 既登録: $existing 本"
              echo "- 一覧で発見: $found 本"
              echo "- **新着: $count 本**"
              if [ "$count" != "0" ]; then
                echo ""
                echo "### 新着記事"
                jq -r '.new_articles[] | "- [\(.title)](\(.url)) \\\`\(.slug)\\\`"' /tmp/check_result.json
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
