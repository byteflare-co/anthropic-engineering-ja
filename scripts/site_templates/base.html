<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>{% block title %}{% endblock %}Anthropic Engineering 日本語版</title>
<meta name="description" content="Anthropic Engineering ブログの非公式日本語訳コレクション。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ prefix }}assets/site.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ prefix }}index.html" aria-label="ホームへ">
        <span class="brand-glyph">◈</span>
        <span class="brand-text">Engineering at Anthropic <em>日本語版</em></span>
      </a>
      <nav class="site-nav">
        <a href="https://www.anthropic.com/engineering" target="_blank" rel="noopener">Original (English)</a>
        <a href="https://github.com/byteflare-co/anthropic-engineering-ja" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container site-main">
    {% block main %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-note">
        Anthropic Engineering ブログ記事の非公式日本語訳コレクション。翻訳は Claude による機械翻訳。<br>
        記事本文の著作権は Anthropic PBC に帰属します。
      </p>
      <p class="footer-links">
        <a href="https://www.anthropic.com/engineering" target="_blank" rel="noopener">Original</a>
        <span>·</span>
        <a href="https://github.com/byteflare-co/anthropic-engineering-ja" target="_blank" rel="noopener">GitHub</a>
        <span>·</span>
        <span>Built by byteflare-co</span>
      </p>
    </div>
  </footer>
</body>
</html>
